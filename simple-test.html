<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>最简单的测试</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .test { margin: 20px 0; padding: 20px; border: 2px solid #ccc; border-radius: 10px; }
    input { width: 100%; padding: 15px; font-size: 18px; margin: 10px 0; border: 2px solid #007AFF; border-radius: 8px; }
    button { padding: 15px 30px; font-size: 18px; background: #007AFF; color: white; border: none; border-radius: 8px; margin: 10px 5px; }
    .result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>最简单的功能测试</h1>
  
  <div class="test">
    <h2>测试1: 普通输入框</h2>
    <input type="text" id="normal-input" placeholder="普通输入框 - 应该可以输入">
    <button onclick="testNormal()">测试这个输入框</button>
  </div>
  
  <div class="test">
    <h2>测试2: 有readonly属性的输入框</h2>
    <input type="text" id="readonly-input" placeholder="有readonly属性 - 应该不能输入" readonly>
    <button onclick="removeReadonly()">移除readonly属性</button>
  </div>
  
  <div class="test">
    <h2>测试3: 按钮点击</h2>
    <button onclick="showMessage('按钮1点击了')">按钮1</button>
    <button onclick="showMessage('按钮2点击了')">按钮2</button>
    <button onclick="showMessage('按钮3点击了')">按钮3</button>
  </div>
  
  <div class="test">
    <h2>测试4: 触摸事件</h2>
    <div id="touch-area" style="padding: 30px; background: #e0e0e0; border-radius: 10px; text-align: center;">
      触摸这个区域
    </div>
  </div>
  
  <div id="result" class="result"></div>

  <script>
    function showMessage(msg) {
      const result = document.getElementById('result');
      result.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
    }
    
    function testNormal() {
      const input = document.getElementById('normal-input');
      input.focus();
      showMessage('普通输入框已获取焦点');
    }
    
    function removeReadonly() {
      const input = document.getElementById('readonly-input');
      input.removeAttribute('readonly');
      input.placeholder = "readonly已移除 - 现在应该可以输入";
      showMessage('已移除readonly属性');
    }
    
    // 触摸事件测试
    const touchArea = document.getElementById('touch-area');
    touchArea.addEventListener('touchstart', (e) => {
      e.preventDefault();
      showMessage('触摸开始');
    });
    touchArea.addEventListener('touchend', () => {
      showMessage('触摸结束');
    });
    
    // 页面加载完成
    showMessage('页面加载完成');
    
    // 测试当前URL
    showMessage('当前URL: ' + window.location.href);
    
    // 测试是否支持触摸
    showMessage('触摸支持: ' + ('ontouchstart' in window ? '是' : '否'));
    
    // 测试浏览器信息
    showMessage('浏览器: ' + navigator.userAgent);
  </script>
</body>
</html>
