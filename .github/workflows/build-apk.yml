name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      KEY_ALIAS: daijia
      KEY_PASSWORD: daijia2024
      STORE_PASSWORD: daijia2024

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
          cp app-fixed.js www/
          cp staff.js www/
          cp amap-adapter.js www/ 2>/dev/null || true
          cp supabase.js www/ 2>/dev/null || true
          cp updater.js www/ 2>/dev/null || true
          cp version.json www/ 2>/dev/null || true
          cp style.css www/
          cp sw.js www/
          cp manifest.json www/
          cp -r icons www/

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/android

      - name: Add Android platform
        run: npx cap add android

      - name: Inject Android permissions into AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />|' "$MANIFEST"
          echo "=== 权限注入完成 ==="
          grep 'permission' "$MANIFEST"

      - name: Setup signing keystore
        run: |
          KEYSTORE_PATH="${GITHUB_WORKSPACE}/daijia-release.jks"

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            # ✅ 使用 GitHub Secret 中存储的固定 keystore
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
            echo "✅ 已从 Secret 加载固定 keystore"
          else
            # ⚠️ 没有 Secret，生成新 keystore（仅首次使用）
            keytool -genkeypair \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 36500 \
              -keystore "$KEYSTORE_PATH" \
              -storepass "$STORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -dname "CN=DaiJia, OU=App, O=DaiJia, L=China, ST=China, C=CN" \
              -noprompt
            echo ""
            echo "========================================================"
            echo "⚠️  首次生成 keystore！请将以下 Base64 内容添加到"
            echo "   GitHub → Settings → Secrets → KEYSTORE_BASE64"
            echo "   否则每次构建签名不同，无法直接覆盖安装！"
            echo "========================================================"
            echo ""
            base64 -w 0 "$KEYSTORE_PATH"
            echo ""
            echo "========================================================"
          fi

          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build signed APK (release)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="${KEYSTORE_PATH}" \
            -Pandroid.injected.signing.store.password="${STORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${KEY_PASSWORD}"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: 代驾出行 v${{ github.run_number }}
          body: |
            代驾出行 Android APK

            📱 安装说明：
            1. 点击 `daijia-chuxing.apk` 下载安装
            2. 首次安装需要允许"安装未知来源应用"
            3. 更新时直接安装即可覆盖（同一签名）

            🔗 在线体验：https://pdfeihong.top
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: daijia-chuxing.apk
          path: android/app/build/outputs/apk/release/app-release.apk
