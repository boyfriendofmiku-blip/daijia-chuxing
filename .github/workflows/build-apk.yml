name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
          cp app-fixed.js www/
          cp staff.js www/
          cp amap-adapter.js www/ 2>/dev/null || true
          cp supabase.js www/ 2>/dev/null || true
          cp updater.js www/ 2>/dev/null || true
          cp version.json www/ 2>/dev/null || true
          cp style.css www/
          cp sw.js www/
          cp manifest.json www/
          cp -r icons www/

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/android

      - name: Add Android platform
        run: npx cap add android

      - name: Inject Android permissions into AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # 注入定位权限（精确 + 粗略 + 后台）
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />|' "$MANIFEST"
          echo "=== AndroidManifest.xml (权限部分) ==="
          grep -A2 'permission' "$MANIFEST" | head -20

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build APK (debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daijia-chuxing.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
