<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>代驾出行</title>

  <!-- PWA 配置 -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2C3E50" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="代驾" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />

  <!-- 图标 -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-48.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <!-- 样式 -->
  <link rel="stylesheet" href="style.css" />

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 腾讯地图（callback确保API就绪后才初始化） -->
  <script src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77&callback=onTMapReady"></script>
  <script>
    // 检查Supabase SDK是否成功加载
    setTimeout(function() {
      if (!window.supabase) {
        console.error('Supabase SDK加载失败！');
        var app = document.getElementById('app');
        if (app) {
          app.innerHTML = '<div style="padding:40px;text-align:center;"><div style="font-size:48px;margin-bottom:20px;">🔴</div><h3>网络连接问题</h3><p style="color:#666;margin:12px 0;">Supabase数据服务加载失败</p><p style="color:#999;font-size:13px;margin:8px 0;">请检查网络连接后刷新页面</p><button onclick="window.location.reload()" style="padding:12px 24px;background:#3498db;color:#fff;border:none;border-radius:8px;font-size:16px;margin-top:12px;">刷新页面</button></div>';
        }
      }
    }, 2000);
    
    // 地图API就绪标记和事件
    window.__tmapReady = false;
    window.onTMapReady = function() {
      window.__tmapReady = true;
      console.log('腾讯地图API已就绪');
      window.dispatchEvent(new Event('tmap-ready'));
    };
  </script>
</head>
<body>
  <div id="app">
    <!-- 动态渲染页面内容 -->
  </div>
  <script src="supabase.js"></script>
  <script src="app-fixed.js"></script>
  <script src="staff.js"></script>
  <script>
    // 注册 Service Worker（失败不影响应用运行）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.log('SW 注册失败（不影响使用）:', err.message);
        });
      });
    }
  </script>
</body>
</html>
