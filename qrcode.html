<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代驾出行 - 扫码体验</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px;
    padding: 48px 40px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4);
  }
  .logo {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #FF6B35, #FF8C42);
    border-radius: 20px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: 0 8px 24px rgba(255,107,53,0.4);
  }
  h1 {
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .subtitle {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    margin-bottom: 32px;
    letter-spacing: 1px;
  }
  .qr-wrapper {
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    display: inline-block;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    margin-bottom: 28px;
  }
  .qr-wrapper img {
    display: block;
    width: 220px;
    height: 220px;
  }
  .tips {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    line-height: 2;
    margin-bottom: 28px;
  }
  .tips span {
    display: inline-block;
    background: rgba(255,107,53,0.2);
    color: #FF8C42;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .url-box {
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 16px;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    word-break: break-all;
    letter-spacing: 0.5px;
  }
  .divider {
    width: 40px;
    height: 3px;
    background: linear-gradient(90deg, #FF6B35, #FF8C42);
    border-radius: 2px;
    margin: 24px auto;
  }
  .badges {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .badge {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid rgba(255,255,255,0.1);
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🚗</div>
  <h1>代驾出行</h1>
  <p class="subtitle">安全 · 快捷 · 专业</p>

  <div class="badges">
    <span class="badge">📱 手机扫码</span>
    <span class="badge">✨ 免安装</span>
    <span class="badge">🔒 安全</span>
  </div>

  <div class="qr-wrapper">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=440x440&data=https://daijia-chuxing.vercel.app/&color=2C3E50&bgcolor=FFFFFF&margin=10" alt="扫码访问代驾出行">
  </div>

  <div class="tips">
    微信 / 支付宝 / 手机相机<br>
    扫描上方二维码即可体验<br>
    <span>无需下载 App</span>
  </div>

  <div class="divider"></div>

  <div class="url-box">
    https://daijia-chuxing.vercel.app/
  </div>
</div>
</body>
</html>
