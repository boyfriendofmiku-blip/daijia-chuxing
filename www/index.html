<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>代驾出行</title>

  <!-- PWA 配置 -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2C3E50" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="代驾" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />

  <!-- 图标 -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-48.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <!-- 样式 -->
  <link rel="stylesheet" href="style.css" />

  <!-- Supabase SDK：多CDN备用，国内可用 -->
  <script>
    // 动态加载Supabase SDK，依次尝试多个CDN
    (function() {
      var cdns = [
        'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js',
        'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js',
        'https://esm.sh/@supabase/supabase-js@2'
      ];
      var tried = 0;
      function tryLoad() {
        if (tried >= cdns.length) {
          console.warn('所有Supabase CDN均加载失败，将使用本地存储模式');
          window.__supabaseLoadFailed = true;
          window.dispatchEvent(new Event('supabase-load-failed'));
          return;
        }
        var s = document.createElement('script');
        s.src = cdns[tried++];
        s.onload = function() {
          console.log('Supabase SDK加载成功:', s.src);
          window.dispatchEvent(new Event('supabase-loaded'));
        };
        s.onerror = function() {
          console.warn('CDN加载失败，尝试下一个:', s.src);
          tryLoad();
        };
        document.head.appendChild(s);
      }
      tryLoad();
    })();
  </script>
  <!-- 腾讯地图（callback确保API就绪后才初始化） -->
  <script src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77&callback=onTMapReady"></script>
  <script>
    // 地图API就绪标记和事件
    window.__tmapReady = false;
    window.onTMapReady = function() {
      window.__tmapReady = true;
      console.log('腾讯地图API已就绪');
      window.dispatchEvent(new Event('tmap-ready'));
    };
    
    // 监听Supabase加载失败事件，切换为本地存储模式
    window.addEventListener('supabase-load-failed', function() {
      console.warn('Supabase不可用，切换为本地存储模式');
      window.__useLocalStorage = true;
    });
  </script>
</head>
<body>
  <div id="app">
    <!-- 动态渲染页面内容 -->
  </div>
  <script src="supabase.js"></script>
  <script src="app-fixed.js"></script>
  <script src="staff.js"></script>
  <script>
    // 注册 Service Worker（失败不影响应用运行）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.log('SW 注册失败（不影响使用）:', err.message);
        });
      });
    }
  </script>
</body>
</html>
