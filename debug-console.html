<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>控制台错误监控</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
    h2 { color: #4CAF50; margin-bottom: 15px; }
    #console { background: #2d2d2d; border-radius: 8px; padding: 15px; height: 400px; overflow-y: auto; font-size: 14px; }
    .log { padding: 5px 0; border-bottom: 1px solid #444; }
    .error { color: #ff6b6b; }
    .warn { color: #ffd93d; }
    .info { color: #4ecdc4; }
    .success { color: #6bcf7f; }
    #controls { margin-top: 20px; display: flex; gap: 10px; }
    button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #45a049; }
    .clear { background: #f44336; }
    .clear:hover { background: #d32f2f; }
  </style>
</head>
<body>
  <h2>🛠️ JavaScript控制台监控</h2>
  <div id="console"></div>
  
  <div id="controls">
    <button onclick="loadApp()">加载主应用</button>
    <button onclick="testMap()">测试地图API</button>
    <button onclick="testInput()">测试输入框</button>
    <button onclick="clearConsole()" class="clear">清空控制台</button>
  </div>

  <script>
    const consoleDiv = document.getElementById('console');
    
    // 重写console方法
    const originalConsole = {
      log: console.log,
      error: console.error,
      warn: console.warn,
      info: console.info
    };
    
    function addLog(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = `log ${type}`;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      consoleDiv.appendChild(div);
      consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }
    
    console.log = function(...args) {
      originalConsole.log.apply(console, args);
      addLog(args.join(' '), 'info');
    };
    
    console.error = function(...args) {
      originalConsole.error.apply(console, args);
      addLog('❌ ' + args.join(' '), 'error');
    };
    
    console.warn = function(...args) {
      originalConsole.warn.apply(console, args);
      addLog('⚠️ ' + args.join(' '), 'warn');
    };
    
    console.info = function(...args) {
      originalConsole.info.apply(console, args);
      addLog('ℹ️ ' + args.join(' '), 'info');
    };
    
    // 捕获未处理的错误
    window.onerror = function(msg, url, line, col, error) {
      addLog(`全局错误: ${msg} (${url}:${line}:${col})`, 'error');
      return false;
    };
    
    window.addEventListener('unhandledrejection', function(e) {
      addLog(`未处理的Promise错误: ${e.reason}`, 'error');
    });
    
    function clearConsole() {
      consoleDiv.innerHTML = '';
      addLog('控制台已清空', 'info');
    }
    
    function loadApp() {
      addLog('开始加载主应用...', 'info');
      
      // 加载Supabase
      const supabaseScript = document.createElement('script');
      supabaseScript.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
      supabaseScript.onload = () => addLog('Supabase加载成功', 'success');
      supabaseScript.onerror = () => addLog('Supabase加载失败', 'error');
      document.head.appendChild(supabaseScript);
      
      // 加载腾讯地图
      const tmapScript = document.createElement('script');
      tmapScript.src = 'https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77';
      tmapScript.onload = () => {
        addLog('腾讯地图API加载成功', 'success');
        if (typeof TMap !== 'undefined') {
          addLog('TMap对象已定义', 'success');
        } else {
          addLog('TMap对象未定义', 'error');
        }
      };
      tmapScript.onerror = () => addLog('腾讯地图API加载失败', 'error');
      document.head.appendChild(tmapScript);
      
      // 加载应用脚本
      setTimeout(() => {
        const appScript = document.createElement('script');
        appScript.src = 'app-fixed.js';
        appScript.onload = () => addLog('app-fixed.js加载成功', 'success');
        appScript.onerror = () => addLog('app-fixed.js加载失败', 'error');
        document.head.appendChild(appScript);
      }, 1000);
    }
    
    function testMap() {
      addLog('测试地图API状态...', 'info');
      if (typeof TMap !== 'undefined') {
        addLog('✅ 地图API已加载', 'success');
        addLog(`TMap版本: ${TMap?.VERSION || '未知'}`, 'info');
      } else {
        addLog('❌ 地图API未加载', 'error');
      }
    }
    
    function testInput() {
      addLog('测试输入框状态...', 'info');
      
      // 创建一个测试输入框
      const testInput = document.createElement('input');
      testInput.type = 'text';
      testInput.placeholder = '测试输入';
      testInput.style.cssText = 'padding:10px;border:1px solid #ccc;margin:10px 0;width:100%';
      consoleDiv.appendChild(testInput);
      
      // 检查readonly属性
      const hasReadonly = testInput.hasAttribute('readonly');
      addLog(`输入框readonly属性: ${hasReadonly ? '存在 ✗' : '不存在 ✓'}`, 
             hasReadonly ? 'error' : 'success');
      
      // 测试焦点
      setTimeout(() => {
        testInput.focus();
        const hasFocus = document.activeElement === testInput;
        addLog(`输入框焦点状态: ${hasFocus ? '已获得焦点 ✓' : '未获得焦点 ✗'}`,
               hasFocus ? 'success' : 'error');
      }, 100);
    }
    
    // 自动开始监控
    addLog('控制台监控已启动', 'success');
    addLog('点击"加载主应用"按钮开始测试', 'info');
  </script>
</body>
</html>
