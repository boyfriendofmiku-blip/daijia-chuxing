<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>直接测试 - 代驾出行</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .test { margin: 20px 0; padding: 20px; border: 2px solid #ccc; border-radius: 10px; }
    input, button { width: 100%; padding: 15px; font-size: 18px; margin: 10px 0; border-radius: 8px; }
    input { border: 2px solid #007AFF; }
    button { background: #007AFF; color: white; border: none; }
    .result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
    .success { color: green; }
    .error { color: red; }
    .warning { color: orange; }
  </style>
</head>
<body>
  <h1>直接测试 - 代驾出行核心功能</h1>
  
  <div class="test">
    <h2>1. 测试地图API加载</h2>
    <button onclick="testMapAPI()">测试腾讯地图API</button>
    <div id="map-status"></div>
  </div>
  
  <div class="test">
    <h2>2. 测试下单页面输入框</h2>
    <input type="text" id="test-from" placeholder="出发地">
    <input type="text" id="test-to" placeholder="目的地">
    <button onclick="testEstimate()">估算费用</button>
    <button onclick="testSubmit()">立即下单</button>
  </div>
  
  <div class="test">
    <h2>3. 测试事件绑定</h2>
    <button onclick="testEvent('click')">测试点击事件</button>
    <button ontouchstart="testEvent('touchstart')">测试触摸事件</button>
    <div id="event-status"></div>
  </div>
  
  <div class="test">
    <h2>4. 检查关键函数是否存在</h2>
    <button onclick="checkFunctions()">检查函数</button>
    <div id="function-status"></div>
  </div>
  
  <div id="result" class="result"></div>

  <script>
    function log(msg, type = 'info') {
      const result = document.getElementById('result');
      const div = document.createElement('div');
      div.className = type;
      div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
      result.appendChild(div);
    }
    
    function testMapAPI() {
      const mapStatus = document.getElementById('map-status');
      if (typeof TMap !== 'undefined') {
        mapStatus.innerHTML = '<div class="success">✅ 腾讯地图API已加载 (TMap对象存在)</div>';
        log('地图API加载成功', 'success');
        
        // 测试具体功能
        try {
          const testLatLng = new TMap.LatLng(23.129, 113.264);
          mapStatus.innerHTML += '<div class="success">✅ TMap.LatLng可用</div>';
          log('TMap.LatLng可用', 'success');
        } catch (e) {
          mapStatus.innerHTML += '<div class="error">❌ TMap.LatLng不可用: ' + e.message + '</div>';
          log('TMap.LatLng不可用: ' + e.message, 'error');
        }
      } else {
        mapStatus.innerHTML = '<div class="error">❌ 腾讯地图API未加载 (TMap对象不存在)</div>';
        log('地图API未加载', 'error');
        
        // 尝试动态加载
        log('尝试动态加载地图API...', 'warning');
        const script = document.createElement('script');
        script.src = 'https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77';
        script.onload = function() {
          mapStatus.innerHTML += '<div class="success">✅ 地图API动态加载成功</div>';
          log('地图API动态加载成功', 'success');
        };
        script.onerror = function() {
          mapStatus.innerHTML += '<div class="error">❌ 地图API动态加载失败</div>';
          log('地图API动态加载失败', 'error');
        };
        document.head.appendChild(script);
      }
    }
    
    function testEstimate() {
      const from = document.getElementById('test-from').value;
      const to = document.getElementById('test-to').value;
      
      if (!from || !to) {
        log('请输入出发地和目的地', 'error');
        return;
      }
      
      // 测试estimatePrice函数是否可用
      if (typeof estimatePrice === 'function') {
        const price = estimatePrice(from, to);
        log(`费用估算: ¥${price}`, 'success');
      } else {
        log('estimatePrice函数不存在', 'error');
      }
    }
    
    function testSubmit() {
      log('测试下单功能...', 'info');
      
      // 测试关键函数是否存在
      const functions = ['showToast', 'navigate', 'DB', 'State'];
      functions.forEach(func => {
        if (window[func] || (func === 'DB' && window.DB) || (func === 'State' && window.State)) {
          log(`${func} 存在`, 'success');
        } else {
          log(`${func} 不存在`, 'error');
        }
      });
    }
    
    function testEvent(type) {
      const eventStatus = document.getElementById('event-status');
      eventStatus.innerHTML = `<div class="success">✅ ${type}事件触发</div>`;
      log(`${type}事件测试通过`, 'success');
    }
    
    function checkFunctions() {
      const functionStatus = document.getElementById('function-status');
      functionStatus.innerHTML = '';
      
      const functions = [
        'initOrderMap', 'estimatePrice', 'showToast', 'navigate',
        'renderCreateOrder', 'bindEvents', 'handleAction'
      ];
      
      functions.forEach(func => {
        if (typeof window[func] === 'function') {
          functionStatus.innerHTML += `<div class="success">✅ ${func}() 函数存在</div>`;
          log(`${func}() 函数存在`, 'success');
        } else {
          functionStatus.innerHTML += `<div class="error">❌ ${func}() 函数不存在</div>`;
          log(`${func}() 函数不存在`, 'error');
        }
      });
    }
    
    // 页面加载时自动测试
    window.addEventListener('load', function() {
      log('页面加载完成', 'info');
      log('当前URL: ' + window.location.href, 'info');
      log('用户代理: ' + navigator.userAgent, 'info');
      
      // 延迟测试地图API
      setTimeout(testMapAPI, 2000);
    });
  </script>
</body>
</html>
