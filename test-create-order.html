<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>下单页面测试</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        .test-section { background: white; padding: 20px; margin: 20px 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .test-section h2 { margin: 0 0 15px 0; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; }
        .input-group { margin: 15px 0; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        input { border: 2px solid #ddd; }
        input:focus { border-color: #3498db; outline: none; }
        button { background: #3498db; color: white; border: none; cursor: pointer; }
        button:hover { background: #2980b9; }
        .result { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; font-family: monospace; }
    </style>
</head>
<body>
    <h1>下单页面功能测试</h1>
    
    <div class="test-section">
        <h2>输入框基础测试</h2>
        <p>测试输入框是否能正常获得焦点和输入文本</p>
        
        <div class="input-group">
            <label>普通输入框（无readonly）:</label>
            <input type="text" id="test-normal" placeholder="点击这里测试，应该可以输入">
        </div>
        
        <div class="input-group">
            <label>可能被设为readonly的输入框:</label>
            <input type="text" id="test-readonly" readonly placeholder="这个应该是readonly的">
        </div>
        
        <button onclick="testFocus()">测试焦点</button>
        <div class="result" id="result-focus"></div>
    </div>
    
    <div class="test-section">
        <h2>事件绑定测试</h2>
        <p>测试事件监听器是否正确绑定</p>
        
        <button onclick="testClick()">测试点击事件</button>
        <button onclick="testInput()">测试输入事件</button>
        
        <div class="result" id="result-events"></div>
    </div>

    <script>
        console.log('测试页面加载完成');
        
        function testFocus() {
            document.getElementById('result-focus').innerHTML = '';
            
            // 尝试移除可能的readonly属性
            var input1 = document.getElementById('test-normal');
            var input2 = document.getElementById('test-readonly');
            
            input1.removeAttribute('readonly');
            input2.removeAttribute('readonly');
            
            setTimeout(function() {
                input1.focus();
                var result = '输入框1: ' + (input1.hasAttribute('readonly') ? 'readonly' : '可编辑') + '<br>';
                result += '输入框2: ' + (input2.hasAttribute('readonly') ? 'readonly' : '可编辑');
                document.getElementById('result-focus').innerHTML = result;
            }, 100);
        }
        
        function testClick() {
            var div = document.getElementById('result-events');
            div.innerHTML = '点击事件触发时间: ' + new Date().toLocaleTimeString();
            
            // 创建一个测试按钮并绑定事件
            var testBtn = document.createElement('button');
            testBtn.textContent = '动态创建的按钮';
            testBtn.onclick = function() {
                div.innerHTML += '<br>动态按钮点击时间: ' + new Date().toLocaleTimeString();
            };
            div.appendChild(testBtn);
        }
        
        function testInput() {
            var input = document.createElement('input');
            input.placeholder = '在这里输入测试';
            input.style.marginTop = '10px';
            input.style.padding = '10px';
            input.oninput = function(e) {
                document.getElementById('result-events').innerHTML += 
                    '<br>输入事件触发: ' + e.target.value;
            };
            document.getElementById('result-events').appendChild(input);
        }
        
        // 自动测试
        setTimeout(function() {
            console.log('自动测试开始');
            testFocus();
        }, 500);
    </script>
</body>
</html>
