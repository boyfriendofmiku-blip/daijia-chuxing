name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEY_ALIAS: daijia
      KEY_PASSWORD: daijia2024
      STORE_PASSWORD: daijia2024

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
          cp app-fixed.js www/
          cp staff.js www/
          cp amap-adapter.js www/ 2>/dev/null || true
          cp supabase.js www/ 2>/dev/null || true
          cp updater.js www/ 2>/dev/null || true
          cp version.json www/ 2>/dev/null || true
          cp style.css www/
          cp sw.js www/
          cp manifest.json www/
          cp capacitor-amap-navi.js www/ 2>/dev/null || true
          cp -r icons www/

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/android
          npm install @capacitor/geolocation

      - name: Add Android platform
        run: |
          rm -rf android
          npx cap add android

      - name: Sync plugins and web assets
        run: npx cap sync android

      - name: Ensure Maven repos in all build.gradle files
        run: |
          if ! grep -q "maven.aliyun.com" android/build.gradle; then
            sed -i '/^allprojects {$/,/^}$/s/repositories {/repositories {\n        maven { url "https:\/\/maven.aliyun.com\/repository\/public" }\n        maven { url "https:\/\/maven.aliyun.com\/repository\/google" }\n        maven { url "https:\/\/maven.aliyun.com\/repository\/central" }/' android/build.gradle
          fi

      - name: Inject Android permissions and network config into AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>|  <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n  <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n  <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n</manifest>|' "$MANIFEST"
          sed -i 's|android:theme="@style/AppTheme">|android:theme="@style/AppTheme" android:usesCleartextTraffic="true">|' "$MANIFEST"

      - name: Create network security config for map APIs
        run: |
          mkdir -p android/app/src/main/res/xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<network-security-config>\n    <base-config cleartextTrafficPermitted="true">\n        <trust-anchors>\n            <certificates src="system" />\n            <certificates src="user" />\n        </trust-anchors>\n    </base-config>\n    <domain-config cleartextTrafficPermitted="true">\n        <domain includeSubdomains="true">webapi.amap.com</domain>\n        <domain includeSubdomains="true">restapi.amap.com</domain>\n        <domain includeSubdomains="true">m.amap.com</domain>\n        <domain includeSubdomains="true">www.amap.com</domain>\n        <domain includeSubdomains="true">uri.amap.com</domain>\n    </domain-config>\n</network-security-config>\n' > android/app/src/main/res/xml/network_security_config.xml

      - name: Setup signing keystore
        run: |
          KEYSTORE_PATH="${GITHUB_WORKSPACE}/daijia-release.jks"

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
          else
            keytool -genkeypair \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 36500 \
              -keystore "$KEYSTORE_PATH" \
              -storepass "$STORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -dname "CN=DaiJia, OU=App, O=DaiJia, L=China, ST=China, C=CN" \
              -noprompt
          fi

          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV

      - name: Build APK
        working-directory: android
        run: |
          rm -rf ~/.gradle/caches/modules-2/files-2.1/com.amap.api 2>/dev/null || true
          chmod +x gradlew
          ./gradlew clean assembleRelease --refresh-dependencies \
            -Pandroid.injected.signing.store.file="${KEYSTORE_PATH}" \
            -Pandroid.injected.signing.store.password="${STORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${KEY_PASSWORD}"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: 代驾出行 v${{ github.run_number }}
          body: |
            代驾出行 Android APK

            📱 安装说明：
            1. 点击 `daijia-chuxing.apk` 下载安装
            2. 首次安装需要允许"安装未知来源应用"
            3. 更新时直接安装即可覆盖（同一签名）

            🔗 在线体验：https://pdfeihong.top
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: daijia-chuxing.apk
          path: android/app/build/outputs/apk/release/app-release.apk
